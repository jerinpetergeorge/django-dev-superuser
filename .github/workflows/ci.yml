name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        django-version: ["4.2", "5.0", "5.1", "5.2", "6.0"]
        exclude:
          # Django 5.0+ requires Python 3.10+
          - { python-version: "3.8",  django-version: "5.0" }
          - { python-version: "3.8",  django-version: "5.1" }
          - { python-version: "3.8",  django-version: "5.2" }
          - { python-version: "3.8",  django-version: "6.0" }
          - { python-version: "3.9",  django-version: "5.0" }
          - { python-version: "3.9",  django-version: "5.1" }
          - { python-version: "3.9",  django-version: "5.2" }
          - { python-version: "3.9",  django-version: "6.0" }
          # Django 4.2 / 5.0 / 5.1 don't support Python 3.13+
          - { python-version: "3.13", django-version: "4.2" }
          - { python-version: "3.13", django-version: "5.0" }
          - { python-version: "3.14", django-version: "4.2" }
          - { python-version: "3.14", django-version: "5.0" }
          - { python-version: "3.14", django-version: "5.1" }
          # Django 6.0 requires Python 3.12+
          - { python-version: "3.10", django-version: "6.0" }
          - { python-version: "3.11", django-version: "6.0" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=${{ matrix.django-version }}.0" ".[dev]"

      - name: Run tests
        run: pytest tests/
